version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  db:
    image: postgres:15-alpine
    container_name: bikefit_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bikefit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bikefit123}
      POSTGRES_DB: ${POSTGRES_DB:-bikefit_pro}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bikefit -d bikefit_pro"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # FastAPI Backend
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bikefit_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-bikefit}:${POSTGRES_PASSWORD:-bikefit123}@db:5432/${POSTGRES_DB:-bikefit_pro}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - DEBUG=${DEBUG:-true}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    # Para acessar webcam do host (se necessário)
    # devices:
    #   - /dev/video0:/dev/video0

  # ============================================
  # React Frontend
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bikefit_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules

volumes:
  postgres_data:
    name: bikefit_postgres_data
